[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.ruff.config.settings.lint]
select = ["E", "F", "S", "ASYNC", "BLE", "FLY",
"I", "C90", "PERF", "B", "FBT", "A", "PL",
"C4", "DTZ", "TID", "SIM", "SLOT", "ARG",
"PTH", "N", "UP", "FURB", "RUF", "TRY"]

ignore = ["E501"]

[language-server.ty]
command = "ty"
args = ["server"]

[[language]]
name = "python"
language-servers = ["ruff", "ty"]
formatter = { command = "sh", args = [
  "-c",
  "uvx ruff check --extend-select I --fix - | uvx ruff format -"
] }
